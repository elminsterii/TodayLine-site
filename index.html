<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TodayLine – Legal Documents</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: #1a1a1a;
      background: #f8f9fa;
      line-height: 1.7;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      background: #1a73e8;
      color: #fff;
      padding: 48px 0 36px;
      text-align: center;
    }
    header h1 { font-size: 2rem; letter-spacing: -0.5px; }
    header p  { font-size: 0.95rem; margin-top: 8px; opacity: 0.85; }
    main {
      max-width: 640px;
      margin: 56px auto;
      padding: 0 24px;
      flex: 1;
    }
    .card-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    @media (max-width: 480px) {
      .card-grid { grid-template-columns: 1fr; }
    }
    .card {
      background: #fff;
      border: 1px solid #e8eaed;
      border-radius: 10px;
      padding: 28px 24px;
      text-decoration: none;
      color: inherit;
      transition: box-shadow 0.15s, border-color 0.15s;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .card:hover {
      box-shadow: 0 4px 16px rgba(26,115,232,0.12);
      border-color: #1a73e8;
    }
    .card-icon {
      width: 40px;
      height: 40px;
      background: #e8f0fe;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card-icon svg {
      width: 22px;
      height: 22px;
      fill: #1a73e8;
    }
    .card-title {
      font-size: 1rem;
      font-weight: 600;
      color: #1a1a1a;
    }
    .card-desc {
      font-size: 0.88rem;
      color: #5f6368;
      line-height: 1.5;
    }
    .card-link {
      font-size: 0.85rem;
      color: #1a73e8;
      font-weight: 500;
      margin-top: auto;
    }
    footer {
      text-align: center;
      font-size: 0.82rem;
      color: #80868b;
      padding: 32px 24px;
      border-top: 1px solid #e8eaed;
    }
  </style>
</head>
<body>

<header>
  <h1>TodayLine</h1>
  <p>Legal &amp; Policy Documents</p>
</header>

<main>
  <div class="card-grid">
    <a class="card" href="privacy-policy.html">
      <div class="card-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 4a3 3 0 1 1 0 6 3 3 0 0 1 0-6zm0 14c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08s5.97 1.09 6 3.08A7.232 7.232 0 0 1 12 19z"/>
        </svg>
      </div>
      <div class="card-title">Privacy Policy</div>
      <div class="card-desc">How TodayLine collects, uses, and protects your personal data.</div>
      <div class="card-link">Read →</div>
    </a>

    <a class="card" href="terms-of-service.html">
      <div class="card-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zm-1 1.5L18.5 9H13V3.5zM6 20V4h5v7h7v9H6z"/>
        </svg>
      </div>
      <div class="card-title">Terms of Service</div>
      <div class="card-desc">The terms and conditions governing your use of TodayLine.</div>
      <div class="card-link">Read →</div>
    </a>
  </div>
</main>

<footer>
  &copy; 2026 TodayLine. All rights reserved.
</footer>

</body>
</html>
